<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">

    <title>Mekatronik Ders Notları</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f9; margin: 0; padding: 0; color: #333; }

        .btn-upload:hover { background-color: #218838; }
        .ders-kutu { border-bottom: 1px solid #ddd; padding: 15px 0; }
        .ders-kutu h3 { margin: 0 0 10px 0; color: #007bff; }
        .not-link { display: inline-block; background-color: #f1f3f5; color: #495057; padding: 5px 10px; margin: 5px 5px 5px 0; border-radius: 3px; text-decoration: none; font-size: 14px; border: 1px solid #ced4da; }
        .not-link:hover { background-color: #e2e6ea; }
    </style>
</head>
<body>

    <header>

    <div class="container">
        <a href="BURAYA_GOOGLE_FORM_LINKINI_YAPISTIR" target="_blank" class="btn-upload">🚀 Sende Var Olan Bir Notu/Soruyu Yükle</a>

        <h2>Ders Listesi</h2>
        <hr>

            <h3>Matematik 1</h3>

        </div>

</body>
</html>
